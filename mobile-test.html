<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste responsivo - Controle Financeiro</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        gap: 24px;
        align-items: flex-start;
        justify-content: center;
        flex-wrap: wrap;
        padding: 24px;
        background: #d9e6ee;
        font-family: system-ui, sans-serif;
      }

      iframe {
        border: 0;
        box-shadow: 0 20px 50px rgba(24, 35, 52, 0.2);
        background: #fff;
      }

      .device {
        display: grid;
        gap: 8px;
      }

      .device strong {
        color: #172033;
      }

      .tablet iframe {
        width: 768px;
        height: 900px;
      }

      .mobile iframe {
        width: 390px;
        height: 844px;
      }
    </style>
  </head>
  <body>
    <div class="device tablet">
      <strong>Tablet 768px</strong>
      <iframe src="/index.html" title="Teste tablet do aplicativo"></iframe>
    </div>
    <div class="device mobile">
      <strong>Celular 390px</strong>
      <iframe src="/index.html" title="Teste mobile do aplicativo"></iframe>
    </div>
  </body>
</html>
